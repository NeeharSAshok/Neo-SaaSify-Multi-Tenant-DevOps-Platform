# Phase 2: Secrets & Compliance
# ServiceAccounts, Role, and RoleBinding per namespace, plus Vault injector configuration skeleton

apiVersion: v1
kind: ServiceAccount
metadata:
  name: tenant-app-sa
  namespace: tenant-alpha
  annotations:
    # Vault Integration: Allows pod to authenticate with HashiCorp Vault using K8s service account
    vault.hashicorp.com/agent-inject: "true"
    vault.hashicorp.com/role: "tenant-alpha-role"
    vault.hashicorp.com/agent-inject-secret-database: "internal/data/tenant-alpha/db-credentials"
    vault.hashicorp.com/agent-inject-template-database: |
      {{- with secret "internal/data/tenant-alpha/db-credentials" -}}
      DATABASE_URL="postgresql://{{ .Data.data.username }}:{{ .Data.data.password }}@postgres-service:5432/tenant_alpha"
      {{- end -}}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tenant-developer-role
  namespace: tenant-alpha
rules:
- apiGroups: [""]
  resources: ["pods", "services", "configmaps"]
  verbs: ["get", "list", "watch", "create", "update", "patch"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "watch", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tenant-developer-binding
  namespace: tenant-alpha
subjects:
- kind: User
  name: alex-developer@saasify.com
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: tenant-developer-role
  apiGroup: rbac.authorization.k8s.io
---
# --- Repeating configuration for Tenant Beta namespace ---
